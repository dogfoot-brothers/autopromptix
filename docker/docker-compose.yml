services:
  # AutoPromptix Server
  autopromptix:
    build:
      context: ..
      dockerfile: docker/Dockerfile.simple
    ports:
      - "8001:8001"
    environment:
      - HOST=0.0.0.0
      - PORT=8001
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    volumes:
      - autopromptix_data:/app/autopromptix_data
    restart: unless-stopped

volumes:
  autopromptix_data: