name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8 black isort mypy
        pip install -e .

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

    - name: Check code formatting with black
      run: |
        black --check --diff .

    - name: Check import sorting with isort
      run: |
        isort --check-only --diff .

    - name: Type check with mypy
      run: |
        mypy autopromptix --ignore-missing-imports

    - name: Test with pytest
      run: |
        pytest --cov=autopromptix --cov-report=xml --cov-report=html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: dashboard/frontend/package-lock.json

    - name: Install frontend dependencies
      run: |
        cd dashboard/frontend
        npm ci

    - name: Run frontend tests
      run: |
        cd dashboard/frontend
        npm test -- --coverage --watchAll=false

    - name: Build frontend
      run: |
        cd dashboard/frontend
        npm run build

    - name: Upload frontend coverage
      uses: codecov/codecov-action@v3
      with:
        directory: ./dashboard/frontend/coverage
        flags: frontend
        name: codecov-frontend

  integration-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r dashboard/requirements.txt
        pip install -e .
        cd dashboard/frontend && npm ci

    - name: Start backend server
      run: |
        cd dashboard/backend
        python server.py &
        sleep 10  # Give server time to start

    - name: Build frontend
      run: |
        cd dashboard/frontend
        npm run build

    - name: Test API endpoints
      run: |
        curl -f http://localhost:8001/health
        curl -f http://localhost:8001/api/stats

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Run security scan
      uses: securecodewarrior/github-action-add-sarif@v1
      with:
        sarif-file: security-scan-results.sarif

    - name: Check for known vulnerabilities
      run: |
        python -m pip install --upgrade pip
        pip install safety
        safety check --json